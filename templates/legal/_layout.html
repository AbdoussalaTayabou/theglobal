{% extends "base.html" %}
{% block title %}{{ title }} — {{ site_name }}{% endblock %}
{% block description %}{{ description }}{% endblock %}
{% block content %}
<section class="container" style="max-width:860px;margin:60px auto;padding:0 20px;">
  <h1 style="font-family:'Playfair Display',serif;font-size:2.6rem;margin-bottom:8px;">{{ title }}</h1>
  <div style="height:3px;width:64px;background:#C9A84C;margin:0 0 28px;"></div>
  <div class="legal-prose" style="font-size:1.02rem;line-height:1.75;color:#1a1a1a;">
    {% block legal_body %}{% endblock %}
  </div>
</section>
<style>
  .legal-prose h2{font-family:'Playfair Display',serif;font-size:1.55rem;margin:32px 0 10px;color:#0A1628;}
  .legal-prose h3{font-size:1.15rem;margin:22px 0 8px;color:#0A1628;}
  .legal-prose p{margin:0 0 12px;}
  .legal-prose ul{margin:0 0 14px 22px;}
  .legal-prose li{margin-bottom:6px;}
  .legal-prose a{color:#C9A84C;text-decoration:underline;}
  .legal-prose hr{border:none;border-top:1px solid #eee;margin:30px 0;}
</style>
{% endblock %}
