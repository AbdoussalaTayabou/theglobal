<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Connexion — Back-office</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:#0f1729;color:#fff;min-height:100vh;display:grid;place-items:center}
    .card{background:#fff;color:#1a2238;padding:40px;border-radius:8px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    h1{font-family:'Playfair Display',serif;margin:0 0 8px;font-size:28px}
    p.sub{margin:0 0 24px;color:#666;font-size:14px}
    label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.1em;margin:14px 0 6px;font-weight:600}
    input{width:100%;padding:12px;border:1px solid #d0d4dc;border-radius:4px;font-size:15px;box-sizing:border-box}
    button{margin-top:22px;width:100%;background:#c9a55a;color:#1a2238;font-weight:700;padding:13px;border:0;border-radius:4px;font-size:14px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer}
    button:hover{background:#b9954a}
    .err{background:#fde2e2;color:#9b1c1c;padding:10px;border-radius:4px;font-size:13px;margin-bottom:12px}
  </style>
</head>
<body>
  <form class="card" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <h1>The Global Chronicle</h1>
    <p class="sub">Back-office — Connexion administrateur</p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat,m in msgs %}<div class="err">{{ m }}</div>{% endfor %}
    {% endwith %}
    <label>Identifiant</label>
    <input name="username" autofocus required>
    <label>Mot de passe</label>
    <input name="password" type="password" required>
    <button type="submit">Se connecter</button>
  </form>
</body>
</html>
