{% extends "base.html" %}
{% block title %}Créer un compte — {{ site_name }}{% endblock %}
{% block body %}
<main class="container" style="max-width:480px;padding:60px 20px;">
  <h1 style="font-family:'Playfair Display',serif;">Créer un compte</h1>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,m in messages %}<div class="flash {{cat}}" style="padding:10px;margin:10px 0;background:#fdecea;border-left:4px solid #c0392b;">{{m}}</div>{% endfor %}
  {% endwith %}
  <form method="post" style="display:grid;gap:14px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Pseudo
      <input type="text" name="username" value="{{ username or '' }}" required minlength="3" maxlength="80" style="width:100%;padding:10px;border:1px solid #ccc;">
    </label>
    <label>Email
      <input type="email" name="email" value="{{ email or '' }}" required style="width:100%;padding:10px;border:1px solid #ccc;">
    </label>
    <label>Mot de passe (8 caractères min.)
      <input type="password" name="password" required minlength="8" style="width:100%;padding:10px;border:1px solid #ccc;">
    </label>
    <label>Confirmer le mot de passe
      <input type="password" name="password2" required minlength="8" style="width:100%;padding:10px;border:1px solid #ccc;">
    </label>
    <button class="btn-gold lg" type="submit">Créer mon compte</button>
  </form>
  <p style="margin-top:20px;">Déjà inscrit ? <a href="{{ url_for('auth.login') }}">Se connecter</a></p>
</main>
{% endblock %}
