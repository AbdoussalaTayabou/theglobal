{% extends "base.html" %}
{% block title %}Inscription confirmée — {{ site_name }}{% endblock %}
{% block body %}
<main class="container" style="max-width:600px;padding:80px 20px;text-align:center;">
  <h1 style="font-family:'Playfair Display',serif;">Merci !</h1>
  <p>Votre inscription à la newsletter est confirmée pour <strong>{{ sub.email }}</strong>.</p>
  <p><a href="{{ url_for('index') }}">Retour à l'accueil</a></p>
  <p style="font-size:.85rem;color:#777;margin-top:30px;">
    Vous pouvez vous <a href="{{ url_for('newsletter.unsubscribe', token=sub.unsubscribe_token) }}">désinscrire</a> à tout moment.
  </p>
</main>
{% endblock %}
